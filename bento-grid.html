<!doctype html>
<html lang="en" style="background-color: rgb(40, 40, 40)">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bento Grid</title>
    <style>
      .page-layout {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .bento-grid {
        max-width: 100%;
        height: 45rem;
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        grid-template-rows: repeat(5, 1fr);
        gap: 1rem;
      }
      .grid-item {
        border: 0.15rem solid rgb(200, 200, 200);
        border-radius: 0.5rem;
        overflow: hidden;
      }
      .grid-item img {
        height: 100%;
        width: 100%;
        display: block;
        object-fit: cover;
      }
      .span-default {
        grid-row: span 2;
        grid-column: span 2;
      }
      .span-center {
        grid-row: span 4;
        grid-column: span 3;
      }
      .span-tall {
        grid-row: span 3;
        grid-column: span 2;
      }
      .span-short {
        grid-column: span 3;
      }
    </style>
  </head>
  <body>
    <main class="page-layout">
      <section class="bento-grid">
        <div class="grid-item span-default">
          <img src="./images/stalker/top-left.jpg" />
        </div>
        <div class="grid-item span-center">
          <img src="./images/stalker/top-mid.jpg" />
        </div>
        <div class="grid-item span-tall">
          <img src="./images/stalker/top-right.jpg" />
        </div>
        <div class="grid-item span-tall">
          <img src="./images/stalker/bottom-left.jpg" />
        </div>
        <div class="grid-item span-short">
          <img src="./images/stalker/bottom-mid.jpg" />
        </div>
        <div class="grid-item" style="grid-row: span 2; grid-column: span 2">
          <img src="./images/stalker/bottom-right.jpg" />
        </div>
      </section>
    </main>
  </body>
</html>
